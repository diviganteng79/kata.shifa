<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SHIFA DI BULAN APRIL</title>
  <style>
    :root {
      --bg: #111;
      --card: #ffffff;
      --text: #111;
      --accent: #2a2a2a;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      display: grid;
      place-items: center;
      padding: 16px;
      background: radial-gradient(circle at center, #2a2a2a 0%, #111 65%);
    }

    #paper {
      width: min(860px, 100%);
      height: min(90dvh, 760px);
      background: var(--card);
      border-radius: 10px;
      padding: clamp(18px, 3vw, 36px);
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      border: 1px solid #d8d8d8;
      position: relative;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(22px, 3.2vw, 34px);
      text-align: center;
      letter-spacing: .4px;
      color: var(--text);
    }

    #lineStage {
      height: calc(100% - 72px);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 14px;
      overflow: hidden;
      transition: justify-content 650ms ease;
    }

    #lineStage.final {
      justify-content: center;
    }

    .line {
      margin: 0;
      font-size: clamp(17px, 2.2vw, 30px);
      line-height: 1.35;
      color: #111;
      opacity: 0;
      transform: translateY(34px);
      animation: riseIn 900ms ease forwards;
      word-wrap: break-word;
      text-align: left;
    }

    .line b {
      font-style: italic;
      font-weight: 700;
    }

    #musicPrompt {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 5;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      color: #fff;
      background: rgba(0, 0, 0, 0.75);
      display: none;
    }

    #musicPrompt.show { display: inline-block; }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(34px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main id="app">
    <section id="paper" aria-label="Pesan untuk Shifa">
      <h1>SHIFA DI BULAN APRIL</h1>
      <div id="lineStage"></div>
    </section>
    <button id="musicPrompt" type="button">Tap untuk putar musik</button>
  </main>

  <script>
    // Musik tetap dari folder assets/audio.
    const MUSIC_NAME = "Menua Bersamamu - Tri Suaka  Kalimba Cover with Tabs.mp3";
    const FILE_VERSION = "1";
    const MUSIC_URL = `./assets/audio/${encodeURIComponent(MUSIC_NAME)}`;

    // Teks berjalan ke atas (muncul satu per satu, tidak hilang).
    const MESSAGE_LINES = [
      '<b>Shifa 07/04/2026</b>, Aku juga sayang ayang',
      '<b>Shifa 07/04/2026</b>, Jangan sayang, buat ayang ajaaa',
      '<b>Shifa 07/04/2026</b>, Iya sayang makasih ayang uda perhatian ke aku, tapi aku gak mau kalo sampe ayang ke susahan karna aku',
      '<b>Shifa 07/04/2026</b>, Sayang makasih yaa, Buat semuanya'
    ];

    const lineStageEl = document.getElementById('lineStage');
    const musicPromptEl = document.getElementById('musicPrompt');

    const bgMusic = new Audio();
    bgMusic.src = `${MUSIC_URL}${MUSIC_URL.includes('?') ? '&' : '?'}v=${encodeURIComponent(FILE_VERSION)}`;
    bgMusic.loop = true;
    bgMusic.preload = 'auto';

    async function startMusic() {
      try {
        await bgMusic.play();
        musicPromptEl.classList.remove('show');
      } catch {
        musicPromptEl.classList.add('show');
      }
    }

    function setupMusicFallback() {
      musicPromptEl.addEventListener('click', async () => {
        await startMusic();
      });

      const resumeOnFirstTouch = async () => {
        if (bgMusic.paused) await startMusic();
        window.removeEventListener('pointerdown', resumeOnFirstTouch);
      };
      window.addEventListener('pointerdown', resumeOnFirstTouch);
    }

    function appendNextLine(index = 0) {
      if (index >= MESSAGE_LINES.length) {
        lineStageEl.classList.add('final');
        return;
      }

      const p = document.createElement('p');
      p.className = 'line';
      p.innerHTML = MESSAGE_LINES[index];
      lineStageEl.appendChild(p);

      setTimeout(() => appendNextLine(index + 1), 1300);
    }

    window.addEventListener('DOMContentLoaded', async () => {
      appendNextLine(0);
      setupMusicFallback();
      await startMusic();
    });
  </script>
</body>
</html>
