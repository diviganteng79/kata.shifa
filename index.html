<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Viewer Dokumen</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      background: #111;
    }

    #viewer {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    #status {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 16px;
      text-align: center;
      color: #fff;
      background: #111;
      z-index: 1;
    }

    #status.hide {
      display: none;
    }

    #musicPrompt {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 2;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      color: #fff;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      display: none;
    }

    #musicPrompt.show {
      display: inline-block;
    }
  </style>
</head>
<body>
  <main id="app">
    <div id="status">Memuat dokumen...</div>
    <iframe id="viewer" title="Penampil Dokumen" referrerpolicy="no-referrer"></iframe>
    <button id="musicPrompt" type="button">Tap untuk putar musik</button>
  </main>

  <script>
    // Ganti NAMA FILE SAJA (boleh ada spasi). Path folder tetap pakai assets/doc dan assets/audio.
    const FILE_NAME = "SHIFA DI BULAN APRIL.pdf";
    const MUSIC_NAME = "Menua Bersamamu - Tri Suaka  Kalimba Cover with Tabs.mp3";

    // Cache-busting: naikkan angka saat ganti isi file dengan nama yang sama.
    const FILE_VERSION = "1";

    // Bangun URL lokal dengan encoding aman agar nama file yang ada spasi tetap valid.
    const FILE_URL = `./assets/doc/${encodeURIComponent(FILE_NAME)}`;
    const MUSIC_URL = `./assets/audio/${encodeURIComponent(MUSIC_NAME)}`;

    const statusEl = document.getElementById("status");
    const viewerEl = document.getElementById("viewer");
    const musicPromptEl = document.getElementById("musicPrompt");

    const bgMusic = new Audio();
    bgMusic.src = `${MUSIC_URL}${MUSIC_URL.includes("?") ? "&" : "?"}v=${encodeURIComponent(FILE_VERSION)}`;
    bgMusic.loop = true;
    bgMusic.preload = "auto";

    function appendVersion(url, version) {
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}v=${encodeURIComponent(version)}`;
    }

    function getExtension(url) {
      const cleaned = decodeURIComponent(url.split("?")[0].split("#")[0]).toLowerCase();
      if (cleaned.endsWith(".pdf")) return "pdf";
      if (cleaned.endsWith(".doc")) return "doc";
      if (cleaned.endsWith(".docx")) return "docx";
      return "unknown";
    }

    async function canAccess(url) {
      try {
        const response = await fetch(url, { method: "GET", cache: "no-store" });
        return response.ok;
      } catch {
        return false;
      }
    }

    function buildIframeSources(fileUrl) {
      const versionedUrl = appendVersion(fileUrl, FILE_VERSION);
      const absoluteVersionedUrl = new URL(versionedUrl, window.location.href).href;
      const absoluteRawUrl = new URL(fileUrl, window.location.href).href;
      const ext = getExtension(fileUrl);

      if (ext === "pdf") return [absoluteVersionedUrl];

      if (ext === "doc" || ext === "docx") {
        return [
          `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(absoluteRawUrl)}`,
          `https://docs.google.com/gview?embedded=1&url=${encodeURIComponent(absoluteRawUrl)}`
        ];
      }

      return [absoluteVersionedUrl];
    }

    async function startMusic() {
      try {
        await bgMusic.play();
        musicPromptEl.classList.remove("show");
      } catch {
        musicPromptEl.classList.add("show");
      }
    }

    function setupMusicFallback() {
      musicPromptEl.addEventListener("click", async () => {
        await startMusic();
      });

      const resumeOnFirstTouch = async () => {
        if (bgMusic.paused) await startMusic();
        window.removeEventListener("pointerdown", resumeOnFirstTouch);
      };
      window.addEventListener("pointerdown", resumeOnFirstTouch);
    }

    async function loadDocument() {
      const fileCheckUrl = new URL(appendVersion(FILE_URL, FILE_VERSION), window.location.href).href;
      const exists = await canAccess(fileCheckUrl);

      if (!exists) {
        statusEl.classList.remove("hide");
        statusEl.textContent = `File tidak ditemukan. Cek nama/path: ${decodeURIComponent(FILE_URL)}`;
        return;
      }

      const sources = buildIframeSources(FILE_URL);
      let sourceIndex = 0;

      function loadCurrentSource() {
        const iframeSrc = sources[sourceIndex];

        statusEl.classList.remove("hide");
        statusEl.textContent = "Memuat dokumen...";

        const loadingGuard = setTimeout(() => {
          if (!statusEl.classList.contains("hide")) {
            if (sourceIndex < sources.length - 1) {
              sourceIndex += 1;
              loadCurrentSource();
              return;
            }
            statusEl.textContent = "Dokumen belum bisa ditampilkan. Jika DOCX di HP bermasalah, ubah file ke PDF.";
          }
        }, 12000);

        viewerEl.onload = () => {
          clearTimeout(loadingGuard);
          statusEl.classList.add("hide");
        };

        viewerEl.onerror = () => {
          clearTimeout(loadingGuard);
          if (sourceIndex < sources.length - 1) {
            sourceIndex += 1;
            loadCurrentSource();
            return;
          }
          statusEl.textContent = `Dokumen gagal dimuat. Cek URL sumber: ${iframeSrc}`;
        };

        viewerEl.src = iframeSrc;
      }

      loadCurrentSource();
    }

    window.addEventListener("DOMContentLoaded", async () => {
      loadDocument();
      setupMusicFallback();
      await startMusic();
    });
  </script>
</body>
</html>
