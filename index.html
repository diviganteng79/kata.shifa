<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Viewer Dokumen</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      background: #111;
    }

    #viewer {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    #status {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 16px;
      text-align: center;
      color: #fff;
      background: #111;
      z-index: 1;
    }

    #status.hide {
      display: none;
    }

    #musicPrompt {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 2;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      color: #fff;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      display: none;
    }

    #musicPrompt.show {
      display: inline-block;
    }
  </style>
</head>
<body>
  <main id="app">
    <div id="status">Memuat dokumen...</div>
    <iframe id="viewer" title="Penampil Dokumen" referrerpolicy="no-referrer"></iframe>
    <button id="musicPrompt" type="button">Tap untuk putar musik</button>
  </main>

  <script>
    // URL file lokal dari folder repo
    const FILE_URL = "./assets/doc/SHIFA%20DI%20BULAN%20APRIL.docx";
    const MUSIC_URL = "./assets/audio/Menua%20Bersamamu%20-%20Tri%20Suaka%20%20Kalimba%20Cover%20with%20Tabs.mp3";

    // Cache-busting: ubah nilai ini saat file diperbarui
    const FILE_VERSION = "1";

    const statusEl = document.getElementById("status");
    const viewerEl = document.getElementById("viewer");
    const musicPromptEl = document.getElementById("musicPrompt");

    const bgMusic = new Audio();
    bgMusic.src = `${MUSIC_URL}${MUSIC_URL.includes("?") ? "&" : "?"}v=${encodeURIComponent(FILE_VERSION)}`;
    bgMusic.loop = true;
    bgMusic.preload = "auto";

    function appendVersion(url, version) {
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}v=${encodeURIComponent(version)}`;
    }

    function getExtension(url) {
      const cleaned = decodeURIComponent(url.split("?")[0].split("#")[0]).toLowerCase();
      if (cleaned.endsWith(".pdf")) return "pdf";
      if (cleaned.endsWith(".doc")) return "doc";
      if (cleaned.endsWith(".docx")) return "docx";
      return "unknown";
    }

    function buildIframeSource(fileUrl) {
      const versionedUrl = appendVersion(fileUrl, FILE_VERSION);
      const absoluteUrl = new URL(versionedUrl, window.location.href).href;
      const ext = getExtension(fileUrl);

      if (ext === "pdf") return absoluteUrl;

      if (ext === "doc" || ext === "docx") {
        return `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(absoluteUrl)}`;
      }

      return absoluteUrl;
    }

    async function startMusic() {
      try {
        await bgMusic.play();
        musicPromptEl.classList.remove("show");
      } catch {
        musicPromptEl.classList.add("show");
      }
    }

    function setupMusicFallback() {
      musicPromptEl.addEventListener("click", async () => {
        await startMusic();
      });

      const resumeOnFirstTouch = async () => {
        if (bgMusic.paused) await startMusic();
        window.removeEventListener("pointerdown", resumeOnFirstTouch);
      };
      window.addEventListener("pointerdown", resumeOnFirstTouch);
    }

    function loadDocument() {
      const iframeSrc = buildIframeSource(FILE_URL);

      viewerEl.onload = () => statusEl.classList.add("hide");

      // Jika viewer eksternal lama merespons, jangan biarkan loading selamanya
      const loadingGuard = setTimeout(() => {
        if (!statusEl.classList.contains("hide")) {
          statusEl.textContent = "Dokumen masih dimuat. Jika DOCX gagal tampil di HP, ubah file ke PDF agar kompatibel.";
        }
      }, 12000);
      viewerEl.onerror = () => {
        statusEl.textContent = "Dokumen gagal dimuat. Cek FILE_URL dan akses file publik.";
      };

      viewerEl.src = iframeSrc;
      viewerEl.addEventListener("load", () => clearTimeout(loadingGuard), { once: true });
    }

    window.addEventListener("DOMContentLoaded", async () => {
      loadDocument();
      setupMusicFallback();
      await startMusic();
    });
  </script>
</body>
</html>
